<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⛳ Golf Sharp Money Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:      #0a0e14;
    --surface: #111720;
    --border:  #1e2a38;
    --green:   #00e5a0;
    --red:     #ff4d6d;
    --yellow:  #f5c842;
    --blue:    #4d9fff;
    --muted:   #4a5568;
    --text:    #e2e8f0;
    --sub:     #718096;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 200;
    gap: 16px;
    flex-wrap: wrap;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 3px; color: var(--green); }
  .logo span { color: var(--text); }
  .header-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .last-update { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--sub); }

  select#eventSelect {
    display: none;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 7px 12px;
    cursor: pointer;
    outline: none;
  }

  .pull-btn {
    background: transparent;
    border: 1px solid var(--green);
    border-radius: 8px;
    color: var(--green);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 16px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .pull-btn:hover { background: var(--green); color: #000; }
  .pull-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Layout ── */
  main { max-width: 1500px; margin: 0 auto; padding: 28px 20px; }

  /* ── Picks Banner ── */
  .picks-banner {
    background: linear-gradient(135deg, #0d2018 0%, #0a1a2e 100%);
    border: 1px solid var(--green);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 28px;
  }
  .picks-banner h2 { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3px; color: var(--green); margin-bottom: 14px; }
  .picks-list { display: flex; gap: 10px; flex-wrap: wrap; }
  .pick-chip {
    background: rgba(0,229,160,0.1);
    border: 1px solid var(--green);
    border-radius: 20px;
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pick-rank {
    background: var(--green);
    color: #000;
    border-radius: 50%;
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
  }
  .no-picks { color: var(--sub); font-size: 13px; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; color: var(--sub); }
  .display-toggle { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--sub); }
  .toggle-switch { position: relative; display: inline-block; width: 40px; height: 22px; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--border); border-radius: 22px; cursor: pointer; transition: 0.2s; }
  .slider:before { content: ''; position: absolute; width: 16px; height: 16px; background: var(--text); border-radius: 50%; left: 3px; top: 3px; transition: 0.2s; }
  input:checked + .slider { background: var(--green); }
  input:checked + .slider:before { transform: translateX(18px); background: #000; }

  /* ── Table ── */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: auto; }

  table { width: 100%; border-collapse: collapse; min-width: 1000px; }

  thead tr { background: #0d1520; }
  th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--sub);
    padding: 13px 12px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }
  th:first-child { text-align: left; cursor: default; }
  th:nth-child(2) { text-align: left; }
  th:hover:not(:first-child) { color: var(--text); }
  th.sort-asc::after  { content: ' ↑'; color: var(--green); }
  th.sort-desc::after { content: ' ↓'; color: var(--green); }

  /* column group dividers */
  th.group-start, td.group-start { border-left: 1px solid var(--border); }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #151e2a; }
  tbody tr.qualifying { background: rgba(0,229,160,0.04); }
  tbody tr.qualifying:hover { background: rgba(0,229,160,0.09); }

  td { padding: 10px 12px; font-size: 13px; text-align: right; }
  td:first-child { text-align: left; }
  td:nth-child(2) { text-align: left; }

  .player-name { font-weight: 600; font-size: 13px; }
  .qualify-badge {
    display: inline-block;
    background: rgba(0,229,160,0.15);
    color: var(--green);
    border-radius: 4px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 5px;
    margin-left: 7px;
    vertical-align: middle;
  }
  .mono { font-family: 'DM Mono', monospace; font-size: 12px; }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .pending-cell { color: var(--muted); font-size: 11px; font-family: 'DM Mono', monospace; }

  /* ── Player Detail Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.78);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 860px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 28px;
    position: relative;
  }

  .modal-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 22px;
    gap: 12px;
  }
  .modal-player-name { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 2px; }
  .modal-event { font-size: 12px; color: var(--sub); margin-top: 4px; }

  .close-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--sub);
    cursor: pointer;
    font-size: 18px;
    padding: 4px 12px;
    flex-shrink: 0;
    transition: border-color 0.2s;
  }
  .close-btn:hover { border-color: var(--red); color: var(--red); }

  .modal-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 22px;
  }
  @media (max-width: 600px) { .modal-stats { grid-template-columns: 1fr; } }

  .stat-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .stat-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--sub); margin-bottom: 8px; font-family: 'DM Mono', monospace; }
  .stat-row { display: flex; gap: 20px; align-items: flex-end; margin-bottom: 6px; }
  .stat-group { display: flex; flex-direction: column; gap: 2px; }
  .stat-sublabel { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat-val { font-size: 16px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .stat-val.small { font-size: 13px; color: var(--sub); }
  .stat-move { font-size: 12px; font-family: 'DM Mono', monospace; }

  .chart-wrap {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .chart-title { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 2px; color: var(--sub); margin-bottom: 14px; }

  .loading { text-align: center; padding: 60px 0; color: var(--sub); font-size: 13px; }
  .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">⛳ Sharp<span>Golf</span></div>
  <div class="header-right">
    <select id="eventSelect"></select>
    <button class="pull-btn" id="pullBtn" onclick="pullNow()">⬇ Pull Now</button>
    <div class="last-update" id="lastUpdate">Loading...</div>
  </div>
</header>

<main>

  <div class="picks-banner">
    <h2>📡 Wednesday Picks — Sharp Money Top 5</h2>
    <div class="picks-list" id="picksList"><span class="no-picks">Loading...</span></div>
  </div>

  <div class="toolbar">
    <div class="section-title">All Players</div>
    <div class="display-toggle">
      <span>American Odds</span>
      <label class="toggle-switch">
        <input type="checkbox" id="oddsToggle" onchange="toggleDisplay()">
        <span class="slider"></span>
      </label>
      <span>Implied %</span>
    </div>
  </div>

  <div class="table-wrap">
    <table id="scoresTable">
      <thead>
        <tr>
          <th>#</th>
          <th onclick="sortBy('player')">Player</th>
          <th class="group-start" onclick="sortBy('baseline')">Baseline</th>
          <th onclick="sortBy('current_total')">Current</th>
          <th onclick="sortBy('delta')">Δ Total</th>
          <th class="group-start" onclick="sortBy('winner_open')">Win Open</th>
          <th onclick="sortBy('winner_current')">Win Now</th>
          <th onclick="sortBy('winner_move')">Win Δ</th>
          <th class="group-start" onclick="sortBy('top5_open')">T5 Open</th>
          <th onclick="sortBy('top5_current')">T5 Now</th>
          <th onclick="sortBy('top5_move')">T5 Δ</th>
          <th class="group-start" onclick="sortBy('top10_open')">T10 Open</th>
          <th onclick="sortBy('top10_current')">T10 Now</th>
          <th onclick="sortBy('top10_move')">T10 Δ</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="14"><div class="loading"><div class="spinner"></div><br>Fetching odds data...</div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Player Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-player-name" id="modalName"></div>
        <div class="modal-event" id="modalEvent"></div>
      </div>
      <button class="close-btn" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-stats" id="modalStats"></div>
    <div class="chart-wrap">
      <div class="chart-title">IMPLIED PROBABILITY MOVEMENT — ALL MARKETS OVERLAID</div>
      <canvas id="modalChart" height="110"></canvas>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let allScores  = [];
let showAmerican = true;
let activeEvent  = null;
let sortKey    = 'delta';
let sortDir    = -1;
let modalChart = null;

// ── Odds helpers ───────────────────────────────────────────────────────────
function impliedToAmerican(imp) {
  if (!imp || imp <= 0) return '—';
  const p = imp / 100;
  if (p >= 0.5) return String(Math.round(-p / (1 - p) * 100));
  return '+' + Math.round((1 - p) / p * 100);
}

function fmtOdds(implied) {
  if (!implied || implied === 0) return '—';
  if (showAmerican) return impliedToAmerican(implied);
  return implied.toFixed(1) + '%';
}

function fmtDelta(move) {
  if (move === 0 || move == null) return '—';
  return (move > 0 ? '+' : '') + move.toFixed(2) + '%';
}

function moveClass(v) {
  if (v > 0.05)  return 'positive';
  if (v < -0.05) return 'negative';
  return '';
}

// ── Event selector ─────────────────────────────────────────────────────────
async function loadEvents() {
  try {
    const resp   = await fetch('/api/events');
    const events = await resp.json();
    const sel    = document.getElementById('eventSelect');
    if (!events.length) return;
    sel.innerHTML = events.map((e, i) =>
      `<option value="${e.key}" ${i===0?'selected':''}>${e.title}</option>`
    ).join('');
    activeEvent = events[0].key;
    sel.style.display = 'block';
    sel.addEventListener('change', () => { activeEvent = sel.value; loadScores(); });
  } catch (e) {}
}

function eventParam() {
  return activeEvent ? '?event=' + encodeURIComponent(activeEvent) : '';
}

// ── Scores ─────────────────────────────────────────────────────────────────
async function loadScores() {
  try {
    const resp = await fetch('/api/scores' + eventParam());
    allScores  = await resp.json();
    renderTable();
    renderPicks();
    document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="14" style="text-align:center;padding:40px;color:var(--red)">Could not load data — is the server running?</td></tr>';
  }
}

// ── Sorting ────────────────────────────────────────────────────────────────
const COL_KEYS = ['_rank','player','baseline','current_total','delta',
                  'winner_open','winner_current','winner_move',
                  'top5_open','top5_current','top5_move',
                  'top10_open','top10_current','top10_move'];

function sortBy(key) {
  sortDir = (sortKey === key) ? sortDir * -1 : (key === 'player' ? 1 : -1);
  sortKey = key;
  document.querySelectorAll('th').forEach(th => th.classList.remove('sort-asc','sort-desc'));
  const idx = COL_KEYS.indexOf(key);
  if (idx >= 0) document.querySelectorAll('th')[idx].classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  renderTable();
}

function getVal(p, key) {
  const m = {
    baseline: p.baseline, current_total: p.current_total, delta: p.delta,
    winner_open: p.winner.open_implied, winner_current: p.winner.current_implied, winner_move: p.winner.move,
    top5_open: p.top5.open_implied, top5_current: p.top5.current_implied, top5_move: p.top5.move,
    top10_open: p.top10.open_implied, top10_current: p.top10.current_implied, top10_move: p.top10.move,
    player: p.player,
  };
  return m[key] ?? p.score;
}

// ── Render table ───────────────────────────────────────────────────────────
function renderTable() {
  const scores = [...allScores].sort((a, b) => {
    const av = getVal(a, sortKey), bv = getVal(b, sortKey);
    if (typeof av === 'string') return av.localeCompare(bv) * sortDir;
    return (av - bv) * sortDir;
  });

  const tbody = document.getElementById('tableBody');
  if (!scores.length) {
    tbody.innerHTML = '<tr><td colspan="14" style="text-align:center;padding:40px;color:var(--sub)">No data yet — hit Pull Now to fetch odds.</td></tr>';
    return;
  }

  tbody.innerHTML = scores.map((p, i) => {
    const p5  = p.top5.open_implied  === 0 && p.top5.current_implied  === 0;
    const p10 = p.top10.open_implied === 0 && p.top10.current_implied === 0;
    return `<tr class="${p.qualifies ? 'qualifying' : ''}" onclick="openModal('${p.player.replace(/'/g,"\\'")}')">
      <td class="mono" style="color:var(--sub)">${i+1}</td>
      <td><span class="player-name">${p.player}</span>${p.qualifies ? '<span class="qualify-badge">PICK</span>' : ''}</td>
      <td class="mono group-start">${fmtOdds(p.baseline)}</td>
      <td class="mono">${fmtOdds(p.current_total)}</td>
      <td class="mono ${moveClass(p.delta)}">${fmtDelta(p.delta)}</td>
      <td class="mono group-start">${fmtOdds(p.winner.open_implied)}</td>
      <td class="mono ${moveClass(p.winner.move)}">${fmtOdds(p.winner.current_implied)}</td>
      <td class="mono ${moveClass(p.winner.move)}">${fmtDelta(p.winner.move)}</td>
      ${p5 ? '<td class="pending-cell group-start">pending</td><td class="pending-cell">pending</td><td class="pending-cell">—</td>'
           : `<td class="mono group-start">${fmtOdds(p.top5.open_implied)}</td><td class="mono ${moveClass(p.top5.move)}">${fmtOdds(p.top5.current_implied)}</td><td class="mono ${moveClass(p.top5.move)}">${fmtDelta(p.top5.move)}</td>`}
      ${p10 ? '<td class="pending-cell group-start">pending</td><td class="pending-cell">pending</td><td class="pending-cell">—</td>'
            : `<td class="mono group-start">${fmtOdds(p.top10.open_implied)}</td><td class="mono ${moveClass(p.top10.move)}">${fmtOdds(p.top10.current_implied)}</td><td class="mono ${moveClass(p.top10.move)}">${fmtDelta(p.top10.move)}</td>`}
    </tr>`;
  }).join('');
}

// ── Picks banner ───────────────────────────────────────────────────────────
function renderPicks() {
  const picks = allScores.filter(p => p.qualifies).slice(0,5);
  const el = document.getElementById('picksList');
  el.innerHTML = picks.length
    ? picks.map((p,i) => `<div class="pick-chip"><span class="pick-rank">${i+1}</span>${p.player}</div>`).join('')
    : '<span class="no-picks">No qualifying picks yet — all 3 buckets must improve from opening lines.</span>';
}

// ── Toggle ─────────────────────────────────────────────────────────────────
function toggleDisplay() {
  showAmerican = !document.getElementById('oddsToggle').checked;
  renderTable();
  if (document.getElementById('modalOverlay').classList.contains('active')) {
    updateModalStats(document.getElementById('modalName').textContent);
  }
}

// ── Modal ──────────────────────────────────────────────────────────────────
async function openModal(player) {
  const p = allScores.find(x => x.player === player);
  if (!p) return;
  document.getElementById('modalName').textContent  = player;
  document.getElementById('modalEvent').textContent = p.event_title || '';
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
  updateModalStats(player);
  try {
    const resp = await fetch('/api/history/' + encodeURIComponent(player) + eventParam());
    drawChart(await resp.json());
  } catch (e) { console.error(e); }
}

function updateModalStats(player) {
  const p = allScores.find(x => x.player === player);
  if (!p) return;
  const mkts = [
    { label: '🏆 Winner', open: p.winner.open_implied, cur: p.winner.current_implied, move: p.winner.move, pending: false },
    { label: '🥇 Top 5',  open: p.top5.open_implied,   cur: p.top5.current_implied,   move: p.top5.move,   pending: p.top5.open_implied===0 && p.top5.current_implied===0 },
    { label: '🏅 Top 10', open: p.top10.open_implied,  cur: p.top10.current_implied,  move: p.top10.move,  pending: p.top10.open_implied===0 && p.top10.current_implied===0 },
  ];
  document.getElementById('modalStats').innerHTML = mkts.map(m => `
    <div class="stat-card">
      <div class="stat-label">${m.label}</div>
      ${m.pending
        ? '<div style="color:var(--sub);font-size:12px;padding-top:4px">Lines not yet posted</div>'
        : `<div class="stat-row">
            <div class="stat-group">
              <div class="stat-sublabel">Open</div>
              <div class="stat-val small">${fmtOdds(m.open)}</div>
            </div>
            <div class="stat-group">
              <div class="stat-sublabel">Now</div>
              <div class="stat-val ${moveClass(m.move)}">${fmtOdds(m.cur)}</div>
            </div>
          </div>
          <div class="stat-move ${moveClass(m.move)}">${fmtDelta(m.move)} since open</div>`
      }
    </div>`).join('');
}

function drawChart(data) {
  if (modalChart) { modalChart.destroy(); modalChart = null; }
  const allTs = [...new Set([
    ...data.winner.map(s=>s.ts),
    ...data.top5.map(s=>s.ts),
    ...data.top10.map(s=>s.ts),
  ])].sort();

  function ds(snaps, label, color) {
    const byTs = Object.fromEntries(snaps.map(s=>[s.ts, s.implied]));
    return {
      label, spanGaps: true, fill: false, tension: 0.3,
      borderColor: color, backgroundColor: color+'18',
      borderWidth: 2, pointRadius: 3, pointBackgroundColor: color,
      data: allTs.map(ts => byTs[ts] ?? null),
    };
  }

  const datasets = [];
  if (data.winner.length) datasets.push(ds(data.winner, 'Winner', '#00e5a0'));
  if (data.top5.length)   datasets.push(ds(data.top5,   'Top 5',  '#4d9fff'));
  if (data.top10.length)  datasets.push(ds(data.top10,  'Top 10', '#f5c842'));

  modalChart = new Chart(document.getElementById('modalChart'), {
    type: 'line',
    data: {
      labels: allTs.map(ts => new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',hour12:true})),
      datasets,
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, labels: { color:'#718096', font:{family:'DM Sans',size:12}, boxWidth:12, padding:16 } },
        tooltip: { callbacks: { label: ctx => ctx.parsed.y != null ? ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}% implied` : null } }
      },
      scales: {
        x: { ticks:{ color:'#4a5568', font:{size:10}, maxTicksLimit:8 }, grid:{ color:'#1e2a38' } },
        y: { ticks:{ color:'#4a5568', font:{size:11,family:'DM Mono'}, callback: v=>v+'%' }, grid:{ color:'#1e2a38' },
             title:{ display:true, text:'Implied Probability', color:'#4a5568', font:{size:11} } }
      }
    }
  });
}

function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// ── Pull Now ───────────────────────────────────────────────────────────────
async function pullNow() {
  const btn = document.getElementById('pullBtn');
  btn.disabled = true; btn.textContent = '⏳ Pulling...';
  try {
    const data = await (await fetch('/api/pull', {method:'POST'})).json();
    if (data.status === 'already_running') {
      btn.textContent = '⏳ Running...';
      setTimeout(() => { btn.textContent='⬇ Pull Now'; btn.disabled=false; }, 5000);
    } else {
      btn.textContent = '⏳ Fetching...';
      setTimeout(async () => {
        await loadScores();
        btn.textContent = '✓ Done!';
        setTimeout(() => { btn.textContent='⬇ Pull Now'; btn.disabled=false; }, 3000);
      }, 30000);
    }
  } catch (e) {
    btn.textContent = '✗ Error';
    setTimeout(() => { btn.textContent='⬇ Pull Now'; btn.disabled=false; }, 3000);
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
loadEvents().then(() => loadScores());
setInterval(loadScores, 5 * 60 * 1000);
</script>
