<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⛳ Golf Sharp Money Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:       #0a0e14;
    --surface:  #111720;
    --border:   #1e2a38;
    --green:    #00e5a0;
    --red:      #ff4d6d;
    --yellow:   #f5c842;
    --blue:     #4d9fff;
    --muted:    #4a5568;
    --text:     #e2e8f0;
    --subtext:  #718096;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--green);
  }
  .logo span { color: var(--text); }

  .last-update {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--subtext);
  }

  /* ── Layout ── */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* ── Weights Panel ── */
  .weights-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 32px;
    display: flex;
    gap: 32px;
    align-items: center;
    flex-wrap: wrap;
  }

  .weights-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--subtext);
    white-space: nowrap;
  }

  .weight-inputs {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    flex: 1;
  }

  .weight-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .weight-group label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--subtext);
  }

  .weight-group input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    padding: 8px 12px;
    width: 90px;
    transition: border-color 0.2s;
  }

  .weight-group input:focus {
    outline: none;
    border-color: var(--green);
  }

  .pull-btn {
    background: transparent;
    border: 1px solid var(--green);
    border-radius: 8px;
    color: var(--green);
    cursor: pointer;
    font-family: "DM Sans", sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .pull-btn:hover { background: var(--green); color: #000; }
  .pull-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .pull-btn.pulling { opacity: 0.6; }

  .recalc-btn {
    background: var(--green);
    border: none;
    border-radius: 8px;
    color: #000;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 24px;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .recalc-btn:hover { opacity: 0.85; }

  /* ── Top Picks Banner ── */
  .picks-banner {
    background: linear-gradient(135deg, #0d2018 0%, #0a1a2e 100%);
    border: 1px solid var(--green);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 32px;
  }

  .picks-banner h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--green);
    margin-bottom: 16px;
  }

  .picks-list {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .pick-chip {
    background: rgba(0, 229, 160, 0.1);
    border: 1px solid var(--green);
    border-radius: 20px;
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 600;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pick-rank {
    background: var(--green);
    color: #000;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
  }

  .no-picks {
    color: var(--subtext);
    font-size: 14px;
  }

  /* ── Section Title ── */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--subtext);
    margin-bottom: 16px;
  }

  /* ── Main Table ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 40px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    background: #0d1520;
  }

  th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--subtext);
    padding: 14px 16px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  th:first-child, th:nth-child(2) { text-align: left; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    cursor: pointer;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #151e2a; }
  tbody tr.qualifying { background: rgba(0, 229, 160, 0.04); }
  tbody tr.qualifying:hover { background: rgba(0, 229, 160, 0.09); }

  td {
    padding: 13px 16px;
    font-size: 14px;
    text-align: right;
  }

  td:first-child { text-align: left; }
  td:nth-child(2) { text-align: left; }

  .player-name {
    font-weight: 600;
    font-size: 14px;
  }

  .qualify-badge {
    display: inline-block;
    background: rgba(0, 229, 160, 0.15);
    color: var(--green);
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 6px;
    margin-left: 8px;
    vertical-align: middle;
  }

  .score-cell {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    font-size: 15px;
  }

  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .neutral  { color: var(--subtext); }

  .odds-pair {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .implied {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  .american {
    font-size: 11px;
    color: var(--subtext);
  }

  .move {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
  }

  /* ── Detail Panel (chart area) ── */
  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 32px;
    display: none;
  }

  .detail-panel.active { display: block; }

  .detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .detail-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
  }

  .close-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--subtext);
    cursor: pointer;
    font-size: 20px;
    padding: 4px 12px;
    transition: border-color 0.2s;
  }
  .close-btn:hover { border-color: var(--red); color: var(--red); }

  .charts-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-bottom: 16px;
  }

  @media (max-width: 900px) {
    .charts-grid { grid-template-columns: 1fr; }
  }

  .chart-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .chart-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 2px;
    color: var(--subtext);
    margin-bottom: 12px;
  }

  /* ── Loading / Empty ── */
  .loading {
    text-align: center;
    padding: 60px 0;
    color: var(--subtext);
    font-size: 14px;
  }

  .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toggle for odds display ── */
  .display-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--subtext);
  }

  .toggle-switch {
    position: relative;
    display: inline-block;
    width: 44px;
    height: 24px;
  }

  .toggle-switch input { opacity: 0; width: 0; height: 0; }

  .slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 24px;
    cursor: pointer;
    transition: 0.2s;
  }

  .slider:before {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    background: var(--text);
    border-radius: 50%;
    left: 3px;
    top: 3px;
    transition: 0.2s;
  }

  input:checked + .slider { background: var(--green); }
  input:checked + .slider:before { transform: translateX(20px); background: #000; }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 12px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">⛳ Sharp<span>Golf</span></div>
  <div style="display:flex;align-items:center;gap:20px">
    <select id="eventSelect" style="display:none;background:var(--bg);border:1px solid var(--border);
      border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;
      padding:8px 12px;cursor:pointer;outline:none"></select>
    <button class="pull-btn" id="pullBtn" onclick="pullNow()">⬇ Pull Now</button>
    <div class="last-update" id="lastUpdate">Loading...</div>
  </div>
</header>

<main>

  <!-- Weight coefficients -->
  <div class="weights-panel">
    <div class="weights-title">Scoring Weights</div>
    <div class="weight-inputs">
      <div class="weight-group">
        <label>Winner (X)</label>
        <input type="number" id="wWinner" value="1.0" step="0.1" min="0">
      </div>
      <div class="weight-group">
        <label>Top 5 (Y)</label>
        <input type="number" id="wTop5" value="1.0" step="0.1" min="0">
      </div>
      <div class="weight-group">
        <label>Top 10 (Z)</label>
        <input type="number" id="wTop10" value="1.0" step="0.1" min="0">
      </div>
    </div>
    <button class="recalc-btn" onclick="applyWeights()">Recalculate</button>
  </div>

  <!-- Top 5 picks -->
  <div class="picks-banner">
    <h2>📡 Wednesday Picks — Sharp Money Top 5</h2>
    <div class="picks-list" id="picksList">
      <span class="no-picks">Loading picks...</span>
    </div>
  </div>

  <!-- Player detail / chart panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <div class="detail-name" id="detailName"></div>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-label">🏆 Winner Odds</div>
        <canvas id="chartWinner" height="200"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-label">🥇 Top 5 Odds</div>
        <canvas id="chartTop5" height="200"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-label">🏅 Top 10 Odds</div>
        <canvas id="chartTop10" height="200"></canvas>
      </div>
    </div>
  </div>

  <!-- All players table -->
  <div class="toolbar">
    <div class="section-title">All Players</div>
    <div class="display-toggle">
      <span>American Odds</span>
      <label class="toggle-switch">
        <input type="checkbox" id="oddsToggle" onchange="toggleDisplay()">
        <span class="slider"></span>
      </label>
      <span>Implied %</span>
    </div>
  </div>

  <div class="table-wrap">
    <table id="scoresTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Player</th>
          <th>Win Open</th>
          <th>Win Current</th>
          <th>T5 Open</th>
          <th>T5 Current</th>
          <th>T10 Open</th>
          <th>T10 Current</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr>
          <td colspan="12">
            <div class="loading">
              <div class="spinner"></div><br>Fetching odds data...
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</main>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let allScores    = [];
let showAmerican = true;  // default display is American odds
let weights      = { winner: 1.0, top5: 1.0, top10: 1.0 };
let chartInstances = {};
let activeEvent  = null;   // sport_key of selected event; null = most recent

// ── Utilities ──────────────────────────────────────────────────────────────
function impliedToAmerican(implied) {
  const p = implied / 100;
  if (p >= 0.5) return Math.round(-p / (1 - p) * 100);
  return Math.round((1 - p) / p * 100);
}

function fmtImplied(v) { return v.toFixed(1) + '%'; }
function fmtAmerican(v) { return v > 0 ? '+' + v : '' + v; }

function fmtOdds(implied) {
  if (showAmerican) return fmtAmerican(impliedToAmerican(implied));
  return fmtImplied(implied);
}

function fmtMove(move) {
  return (move > 0 ? '+' : '') + move.toFixed(2) + '%';
}

function moveClass(v) {
  if (v > 0.1) return 'positive';
  if (v < -0.1) return 'negative';
  return 'neutral';
}

function calcScore(p) {
  return (p.winner.move * weights.winner) +
         (p.top5.move   * weights.top5)   +
         (p.top10.move  * weights.top10);
}

function eventParam() {
  return activeEvent ? `?event=${encodeURIComponent(activeEvent)}` : '';
}

// ── Event Switcher ─────────────────────────────────────────────────────────
async function loadEvents() {
  try {
    const resp   = await fetch('/api/events');
    const events = await resp.json();
    const select = document.getElementById('eventSelect');
    if (!events.length) return;

    select.innerHTML = events.map((e, i) =>
      `<option value="${e.key}" ${i === 0 ? 'selected' : ''}>${e.title}</option>`
    ).join('');

    activeEvent = events[0].key;
    select.style.display = 'block';
    select.addEventListener('change', () => {
      activeEvent = select.value;
      closeDetail();
      loadScores();
    });
  } catch (e) { /* no events yet */ }
}

// ── Fetch & Render ─────────────────────────────────────────────────────────
async function loadScores() {
  try {
    const resp = await fetch('/api/scores' + eventParam());
    allScores  = await resp.json();
    renderTable();
    renderPicks();
    document.getElementById('lastUpdate').textContent =
      'Updated: ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="12" style="text-align:center;padding:40px;color:var(--red)">
        Could not load data — is the server running?
      </td></tr>`;
  }
}

function renderTable() {
  const scores = allScores.map(p => ({ ...p, score: calcScore(p) }));
  scores.sort((a, b) => (a.qualifies === b.qualifies) ? b.score - a.score : b.qualifies - a.qualifies);

  const tbody = document.getElementById('tableBody');
  if (!scores.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--subtext)">No data yet — waiting for first snapshot.</td></tr>';
    return;
  }

  tbody.innerHTML = scores.map((p, i) => `
    <tr class="${p.qualifies ? 'qualifying' : ''}" onclick="loadDetail('${p.player.replace(/'/g, "\\'")}')">
      <td style="color:var(--subtext);font-family:'DM Mono',monospace;font-size:13px">${i + 1}</td>
      <td>
        <span class="player-name">${p.player}</span>
        ${p.qualifies ? '<span class="qualify-badge">PICK</span>' : ''}
      </td>
      ${openCurrentCells(p.winner.open_implied, p.winner.current_implied, p.winner.move)}
      ${openCurrentCells(p.top5.open_implied,   p.top5.current_implied,   p.top5.move)}
      ${openCurrentCells(p.top10.open_implied,  p.top10.current_implied,  p.top10.move)}
    </tr>
  `).join('');
}

function openCurrentCells(open, current, move) {
  // 0.0 on all three = market not yet posted
  const unavailable = (open === 0 && current === 0 && move === 0);
  if (unavailable) {
    return `
      <td><span style="color:var(--muted);font-size:12px">pending</span></td>
      <td><span style="color:var(--muted);font-size:12px">pending</span></td>
    `;
  }
  const moveCol = move > 0.1 ? 'positive' : move < -0.1 ? 'negative' : '';
  return `
    <td><span class="implied">${fmtOdds(open)}</span></td>
    <td><span class="implied ${moveCol}">${fmtOdds(current)}</span></td>
  `;
}


function renderPicks() {
  const picks = allScores.filter(p => p.qualifies).slice(0, 5);
  const el = document.getElementById('picksList');
  if (!picks.length) {
    el.innerHTML = '<span class="no-picks">No qualifying picks yet — all 3 buckets must improve from opening.</span>';
    return;
  }
  el.innerHTML = picks.map((p, i) => `
    <div class="pick-chip">
      <span class="pick-rank">${i + 1}</span>
      ${p.player}
    </div>
  `).join('');
}

// ── Weights ────────────────────────────────────────────────────────────────
function applyWeights() {
  weights.winner = parseFloat(document.getElementById('wWinner').value) || 1;
  weights.top5   = parseFloat(document.getElementById('wTop5').value)   || 1;
  weights.top10  = parseFloat(document.getElementById('wTop10').value)  || 1;
  renderTable();
  renderPicks();
}

// ── Toggle display ─────────────────────────────────────────────────────────
function toggleDisplay() {
  // Toggle is OFF = American odds (default), ON = Implied %
  showAmerican = !document.getElementById('oddsToggle').checked;
  renderTable();
}

// ── Player Detail Chart ────────────────────────────────────────────────────
async function loadDetail(player) {
  document.getElementById('detailName').textContent = player;
  document.getElementById('detailPanel').classList.add('active');
  document.getElementById('detailPanel').scrollIntoView({ behavior: 'smooth' });

  const resp = await fetch('/api/history/' + encodeURIComponent(player) + eventParam());
  const data = await resp.json();

  renderChart('chartWinner', data.winner, '#00e5a0');
  renderChart('chartTop5',   data.top5,   '#4d9fff');
  renderChart('chartTop10',  data.top10,  '#f5c842');
}

function renderChart(canvasId, snapshots, color) {
  if (chartInstances[canvasId]) chartInstances[canvasId].destroy();

  const labels   = snapshots.map(s => new Date(s.ts).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', hour12: true }));
  const implied  = snapshots.map(s => s.implied.toFixed(2));
  const american = snapshots.map(s => s.american);

  chartInstances[canvasId] = new Chart(document.getElementById(canvasId), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Implied %',
        data: implied,
        borderColor: color,
        backgroundColor: color + '18',
        borderWidth: 2,
        pointRadius: 3,
        pointBackgroundColor: color,
        fill: true,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            afterBody: (items) => {
              const idx = items[0].dataIndex;
              return [`American: ${american[idx] > 0 ? '+' : ''}${american[idx]}`];
            }
          }
        }
      },
      scales: {
        x: { ticks: { color: '#4a5568', font: { size: 10 }, maxTicksLimit: 6 }, grid: { color: '#1e2a38' } },
        y: { ticks: { color: '#4a5568', font: { size: 11, family: 'DM Mono' }, callback: v => v + '%' }, grid: { color: '#1e2a38' } }
      }
    }
  });
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('active');
}

// ── Manual Pull ───────────────────────────────────────────────────────────
async function pullNow() {
  const btn = document.getElementById('pullBtn');
  btn.disabled = true;
  btn.classList.add('pulling');
  btn.textContent = '⏳ Pulling...';

  try {
    const resp = await fetch('/api/pull', { method: 'POST' });
    const data = await resp.json();

    if (data.status === 'already_running') {
      btn.textContent = '⏳ Already running...';
      setTimeout(() => {
        btn.textContent = '⬇ Pull Now';
        btn.disabled = false;
        btn.classList.remove('pulling');
      }, 5000);
    } else {
      // Pull started — wait 30s then reload data
      btn.textContent = '⏳ Fetching odds...';
      setTimeout(async () => {
        await loadScores();
        btn.textContent = '✓ Done!';
        document.getElementById('lastUpdate').textContent =
          'Updated: ' + new Date().toLocaleTimeString();
        setTimeout(() => {
          btn.textContent = '⬇ Pull Now';
          btn.disabled = false;
          btn.classList.remove('pulling');
        }, 3000);
      }, 30000);
    }
  } catch (e) {
    btn.textContent = '✗ Error';
    setTimeout(() => {
      btn.textContent = '⬇ Pull Now';
      btn.disabled = false;
      btn.classList.remove('pulling');
    }, 3000);
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
loadEvents().then(() => loadScores());
setInterval(loadScores, 5 * 60 * 1000);
</script>
</body>
